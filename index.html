<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>DealerSpecialsHub</title>
  <link rel="stylesheet" href="styles.css"/>
</head>

<body>

<header class="header">
  <img src="logo4Rev.png" class="logo-img" alt="logo">
</header>

<section class="hero">
  <div class="hero-left">
    <h1>
      Find the Best <br>
      <span>Dealer Specials</span> <br>
      Near You
    </h1>
    <p>Search, compare and save on service specials.</p>
  </div>

  <div class="hero-right">
    <img src="car.png" class="hero-car-img" alt="car">
  </div>
</section>

<section class="search">
  <select>
    <option>Service Type</option>
  </select>

  <select>
    <option>Make</option>
  </select>

  <input placeholder="ZIP Code">

  <button>Search Deals</button>
</section>

</body>
</html>
